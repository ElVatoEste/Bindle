<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bindle — package manager for IBM i">
  <defs>
    <linearGradient id="bbg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1b16"/>
      <stop offset="1" stop-color="#070b0a"/>
    </linearGradient>
    <linearGradient id="bring" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="bring2" x1="160" y1="0" x2="0" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6ee7b7"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="520" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ecfdf5"/>
      <stop offset="1" stop-color="#a7f3d0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" fill="url(#bbg)"/>

  <!-- subtle grid -->
  <g stroke="#10b981" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 90 H1200 M0 180 H1200 M0 270 H1200"/>
    <path d="M300 0 V360 M600 0 V360 M900 0 V360"/>
  </g>

  <!-- mark -->
  <g transform="translate(180 180)" fill="none">
    <rect x="-86" y="-32" width="104" height="64" rx="32" transform="rotate(-32)" stroke="url(#bring)" stroke-width="20"/>
    <rect x="-18" y="-32" width="104" height="64" rx="32" transform="rotate(-32)" stroke="url(#bring2)" stroke-width="20"/>
  </g>

  <!-- wordmark -->
  <text x="330" y="172" font-family="'JetBrains Mono','SFMono-Regular',Consolas,monospace" font-size="104" font-weight="700" fill="url(#word)" letter-spacing="-2">bindle</text>
  <text x="334" y="222" font-family="'JetBrains Mono','SFMono-Regular',Consolas,monospace" font-size="27" font-weight="500" fill="#5eead4" letter-spacing="1">package manager for IBM i</text>
  <text x="334" y="262" font-family="'JetBrains Mono','SFMono-Regular',Consolas,monospace" font-size="19" font-weight="400" fill="#3f6b5e" letter-spacing="3">ESCALIA TECHNOLOGIES</text>
</svg>
